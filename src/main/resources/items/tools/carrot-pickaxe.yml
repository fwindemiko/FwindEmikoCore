# 胡萝卜镐 - 工具配置
# 功能：使用此镐挖掘指定矿石时，有概率额外掉落胡萝卜

# CraftEngine 物品命名空间ID
item-id: "miragedge_items:carrot_pickaxe"

# 触发概率 (0-100)
trigger-chance: 25

# 额外掉落数量范围
